name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Optional deployed backend URL for read-only live smoke"
        required: false
        type: string

jobs:
  test:
    name: Compile and smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B -m compileall -q app scripts

      - name: Local smoke
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B scripts/smoke_local.py

  live-smoke:
    name: Live smoke
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.api_url != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Live smoke
        env:
          PARALLAX_LIVE_API_URL: ${{ inputs.api_url }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -B scripts/smoke_live.py
